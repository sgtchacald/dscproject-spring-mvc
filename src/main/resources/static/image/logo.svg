<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1.5" fill="#4F8EF7" opacity="0.05"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="680" height="330" fill="url(#grid)"/>

  <g transform="translate(340,165) scale(0.9) translate(-340,-165)">

  <!-- ======== ICON centralizado em x=340 ======== -->
  <!-- Left bracket < -->
  <path d="M310,20 L266,54 L310,89" fill="none" stroke="#00E5CC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <path d="M370,20 L414,54 L370,89" fill="none" stroke="#00E5CC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash / -->
  <line x1="350" y1="15" x2="330" y2="94" stroke="#4F8EF7" stroke-width="6" stroke-linecap="round"/>

  <!-- Circuit traces -->
  <polyline points="266,54 223,54 223,26 195,26" fill="none" stroke="#00E5CC" stroke-width="1.6" opacity="0.5"/>
  <polyline points="266,54 223,54 223,82 195,82" fill="none" stroke="#00E5CC" stroke-width="1.6" opacity="0.5"/>
  <polyline points="414,54 459,54 459,26 485,26" fill="none" stroke="#00E5CC" stroke-width="1.6" opacity="0.5"/>
  <polyline points="414,54 459,54 459,82 485,82" fill="none" stroke="#00E5CC" stroke-width="1.6" opacity="0.5"/>

  <!-- Endpoint dots -->
  <circle cx="195" cy="26" r="6" fill="#00E5CC" opacity="0.9"/>
  <circle cx="195" cy="82" r="6" fill="#00E5CC" opacity="0.5"/>
  <circle cx="485" cy="26" r="6" fill="#4F8EF7" opacity="0.9"/>
  <circle cx="485" cy="82" r="6" fill="#4F8EF7" opacity="0.5"/>

  <!-- Pulse rings -->
  <circle cx="340" cy="54" r="47" fill="none" stroke="#00E5CC" stroke-width="1.1" opacity="0.15"/>
  <circle cx="340" cy="54" r="68" fill="none" stroke="#00E5CC" stroke-width="0.8" opacity="0.08"/>

  <!-- ======== WORDMARK ======== -->
  <text x="340" y="204" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="90" font-weight="700" letter-spacing="18" fill="#00E5CC">MLED</text>

  <!-- Underline dois tons -->
  <rect x="90" y="219" width="338" height="2" rx="1" fill="#00E5CC" opacity="0.5"/>
  <rect x="428" y="219" width="163" height="2" rx="1" fill="#4F8EF7" opacity="0.9"/>

  <!-- TECNOLOGIA -->
  <text x="340" y="261" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="700" letter-spacing="14" fill="#00E5CC" opacity="1.0">TECNOLOGIA</text>

  <!-- Linhas laterais -->
  <line x1="23" y1="261" x2="124" y2="261" stroke="#00E5CC" stroke-width="1.1" opacity="0.3"/>
  <line x1="556" y1="261" x2="658" y2="261" stroke="#00E5CC" stroke-width="1.1" opacity="0.3"/>

  <!-- Diamantes -->
  <polygon points="138,261 148,255 158,261 148,268" fill="#00E5CC" opacity="0.4"/>
  <polygon points="522,261 532,255 542,261 532,268" fill="#00E5CC" opacity="0.4"/>

  <!-- Tagline -->
  <text x="340" y="303" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#4F8EF7" opacity="1.0" letter-spacing="1">{ build(); deploy(); scale(); }</text>

  <!-- Dots decorativos -->
  <circle cx="310" cy="325" r="2" fill="#00E5CC" opacity="0.4"/>
  <circle cx="325" cy="325" r="2" fill="#00E5CC" opacity="0.7"/>
  <circle cx="340" cy="325" r="2" fill="#00E5CC" opacity="1.0"/>
  <circle cx="355" cy="325" r="2" fill="#00E5CC" opacity="0.7"/>
  <circle cx="370" cy="325" r="2" fill="#00E5CC" opacity="0.4"/>

  </g>

</svg>
