services:
  mysql:
    image: mysql:8.0
    container_name: dsc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Chacal@2024
      MYSQL_DATABASE: dsc_dev_bd
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - dsc-mysql-data:/var/lib/mysql
    networks:
      - dsc-network
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pChacal@2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  dsc-mysql-data:
    driver: local

networks:
  dsc-network:
    driver: bridge
